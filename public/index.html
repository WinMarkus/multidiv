<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiDiv Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        
        .calculator {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        label {
            color: #555;
            font-weight: 600;
            font-size: 1.1em;
        }
        
        input {
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1.2em;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }
        
        button {
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
        }
        
        .multiply {
            background: #667eea;
        }
        
        .multiply:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .divide {
            background: #764ba2;
        }
        
        .divide:hover {
            background: #663a8e;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
        }
        
        .result {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            text-align: center;
            font-size: 1.5em;
            font-weight: 600;
            color: #333;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .error {
            color: #e74c3c;
        }
        
        .success {
            color: #27ae60;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MultiDiv Calculator</h1>
        <div class="calculator">
            <div class="input-group">
                <label for="num1">First Number:</label>
                <input type="number" id="num1" placeholder="Enter first number" step="any">
            </div>
            
            <div class="input-group">
                <label for="num2">Second Number:</label>
                <input type="number" id="num2" placeholder="Enter second number" step="any">
            </div>
            
            <div class="buttons">
                <button class="multiply" onclick="calculate('multiply')">× Multiply</button>
                <button class="divide" onclick="calculate('divide')">÷ Divide</button>
            </div>
            
            <div class="result" id="result">
                Enter numbers and select an operation
            </div>
        </div>
    </div>
    
    <script>
        async function calculate(operation) {
            const num1 = document.getElementById('num1').value;
            const num2 = document.getElementById('num2').value;
            const resultDiv = document.getElementById('result');
            
            if (!num1 || !num2) {
                resultDiv.textContent = 'Please enter both numbers';
                resultDiv.className = 'result error';
                return;
            }
            
            try {
                const response = await fetch(`/api/${operation}?a=${num1}&b=${num2}`);
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.textContent = `Result: ${data.result}`;
                    resultDiv.className = 'result success';
                } else {
                    resultDiv.textContent = `Error: ${data.error}`;
                    resultDiv.className = 'result error';
                }
            } catch (error) {
                resultDiv.textContent = 'Error connecting to server';
                resultDiv.className = 'result error';
            }
        }
        
        // Allow Enter key to trigger calculation
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                calculate('multiply');
            }
        });
    </script>
</body>
</html>
